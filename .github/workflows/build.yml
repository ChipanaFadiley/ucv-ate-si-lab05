name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests with coverage
        run: poetry run pytest

      - name: Validate SonarQube token
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if ("$env:SONAR_TOKEN" -eq "") {
            throw "SONAR_TOKEN is not configured in GitHub Actions secrets."
          }
          $headers = @{ Authorization = "Bearer $env:SONAR_TOKEN" }
          $result = Invoke-RestMethod -Uri "https://sonarcloud.io/api/authentication/validate" -Headers $headers
          if (-not $result.valid) {
            throw "SONAR_TOKEN is configured, but SonarCloud reports it is not valid."
          }
          "SONAR_TOKEN is configured and valid."

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
